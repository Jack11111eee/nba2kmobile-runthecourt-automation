name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: python -m pip install -e .
      - name: Install Windows iPhone backend
        if: runner.os == 'Windows'
        run: python -m pip install -e ".[ios-usb]"
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Compile
        run: python -m compileall -q rtc_bot tests tools
